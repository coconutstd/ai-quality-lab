name: PR gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run pr:gate

  e2e:
    # 실험 17 — 통합/E2E 계층. 단위 테스트가 놓치는 결함(예: 라우트 부재, 실제 브라우저 상호작용)을 포착.
    runs-on: ubuntu-latest
    needs: gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        run: npm run ci:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  bundle-gate:
    # 실험 22 — 빌드 타임 번들 게이트. gate job 과 병렬로 실행.
    # gzip 기준 청크 크기가 BUNDLE_LIMITS 초과 시 exit 1 로 PR 를 블록한다.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Bundle gate
        run: npm run bundle:check
      - name: Upload analyze artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-analyze
          path: .next/analyze/
          retention-days: 7
          if-no-files-found: ignore

  lighthouse:
    # 실험 22 — 런타임 Lighthouse 리포팅 (soft, 항상 exit 0).
    # push:main 시에만 실행해 PR 마다 2분+ 빌드가 추가되는 것을 방지한다.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: bundle-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Chrome (Lighthouse 용)
        uses: browser-actions/setup-chrome@v1
        id: setup-chrome
      - name: Run Lighthouse
        env:
          CHROME_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run perf:report
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 14
          if-no-files-found: warn

  review-precheck:
    # secrets 컨텍스트는 job-level `if:` 에서 직접 참조할 수 없으므로, 키 존재 여부를
    # precheck job 의 output 으로 노출한다. 이렇게 해야 review job 이 "실행되지 않고
    # skipped" 로 표시돼 misleading green(= key 없는데 pass) 을 제거할 수 있다.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      coderabbit_enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        env:
          KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "CodeRabbit API key 감지됨 — review job 실행"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "CodeRabbit API key 없음 — review job 스킵 (misleading green 방지)"
          fi

  review:
    # CodeRabbit AI 사전 리뷰 — PR 이고 키가 설정된 경우에만 실행.
    # 키가 없으면 job 자체가 "skipped" 로 마킹되어 PR UI 에서 회색 표시.
    if: |
      github.event_name == 'pull_request' &&
      needs.review-precheck.outputs.coderabbit_enabled == 'true'
    runs-on: ubuntu-latest
    needs: [gate, review-precheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: CodeRabbit review
        env:
          CODERABBIT_API_KEY: ${{ secrets.CODERABBIT_API_KEY }}
        run: npx coderabbit review --agent -t all
